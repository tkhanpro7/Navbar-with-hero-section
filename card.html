<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing Card</title>
    <link rel="stylesheet" href="styles/card.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>
    <section class="card-section">
        <div class="card-head">
            <h1>Plus</h1>
            <span class="badge">POPULAR</span>
        </div>
        <div class="price">
            <div class="amount">
                <span class="dollar">$</span>
                <span class="number">20</span>
            </div>

            <span class="month">USD / month</span>
        </div>
        <div class="caed-end">
            <h2>Unlock the full exprience</h2>
            <button>Upgrade to Plus</button>
            <ul>
                <li><i class="fa-regular fa-star"></i>Advanced models</li>
                <li><i class="fa-regular fa-image"></i>Advanced image creation with Thinking</li>
                <li><i class="fa-solid fa-brain"></i>Expanded memory across chats</li>
                <li><i class="fa-solid fa-code"></i>Codex coding agent</li>
                <li><i class="fa-solid fa-magnifying-glass"></i>Expanded deep research</li>
                <li><i class="fa-solid fa-folder-open"></i>Projects and custom GPTs</li>
            </ul>
        </div>
    </section>
</body>

</html>
